# Fine-tune le backbone texte directement (h = f_theta(x)), sans projecteur additionnel.

data:
  data_csv: dataset/data_btp.csv
  input_mode: text
  text_col: sentence
  group_col: accident_id
  val_ratio: 0.1

model:
  input_mode: text
  projection: identity
  freeze_backbone: false
  backbone_model_name_or_path: Qwen/Qwen3-Embedding-0.6B
  pooling: mean
  max_seq_length: 256
  n_class: 4
  n_subclass: 32
  tau: 0.1
  alpha: 0.5
  lmd: 25.0
  n_iter_estep: 5

training:
  strict_finetune_identity: true
  optimizer: adamw
  backbone_lr: 2.0e-5
  head_lr: 1.0e-3
  backbone_weight_decay: 0.01
  head_weight_decay: 0.0001
  scheduler: none
  epochs: 100
  batch_size: 16
  use_self_distillation: false
  kd_t: 4.0
  beta: 1.0
  teacher_mode: none
