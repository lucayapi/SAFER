method_name: supcon
method: supcon
output_dir: resultats/supcon
use_prompt: false
seed: 42

data:
  dataset_path: dataset/data_btp.csv
  text_col: sentence
  label_col: pred_label
  group_col: accident_id
  pred_ok_col: pred_ok
  val_ratio: 0.1

model:
  backbone_name: Qwen/Qwen3-Embedding-0.6B
  max_seq_length: 256

training:
  batch_size: 16
  eval_batch_size: 16
  encode_batch_size: 16
  epochs: 30
  learning_rate: 2.0e-5
  warmup_ratio: 0.1
  gradient_accumulation_steps: 1
  gradient_checkpointing: false
  use_fixed_instruction_prefix: false
  use_contextual_prompt_with_summary: false

supcon:
  temperature: 0.07
  normalize_embeddings: true
